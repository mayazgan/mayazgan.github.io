<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resmi Dilekçe Otomasyonu | MAYAZGAN</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #f59e0b; /* Sivas'ın sarı-sıcak tonu */
            --text-main: #f1f5f9;
        }

        /* --- MODERN ARAYÜZ (EKRAN) --- */
        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0; padding: 40px 20px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        .no-print { width: 100%; max-width: 850px; animation: slideUp 0.5s ease-out; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .form-container {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .full-width { grid-column: span 2; }
        
        label { display: block; font-size: 0.85rem; color: #94a3b8; margin-bottom: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
        
        input, textarea {
            width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #334155;
            background: #020617; color: white; box-sizing: border-box; outline: none;
            font-size: 1rem; transition: all 0.3s ease;
        }

        input:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.1); }

        .btn-print {
            grid-column: span 2; padding: 20px; background: var(--accent);
            border: none; border-radius: 15px; color: #000; font-weight: 800;
            cursor: pointer; font-size: 1.1rem; margin-top: 20px;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-print:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(245, 158, 11, 0.3); }

        /* --- RESMİ DİLEKÇE TASARIMI (A4 ÇIKTI) --- */
        #dilekce-cikti {
            display: none;
            background: white;
            color: black;
            width: 210mm;
            min-height: 297mm;
            padding: 25mm 20mm 20mm 30mm;
            box-sizing: border-box;
            font-family: "Times New Roman", Times, serif;
            font-size: 12pt;
            line-height: 1.6;
            position: relative;
        }

        .back-btn {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 30px;
        }
        
        .out-tarih { text-align: right; margin-bottom: 20px; font-size: 12pt; }

        .ust-bilgi-bloku {
            text-align: left;
            margin-bottom: 45px;
            width: 85%;
        }

        .info-row {
            display: grid;
            grid-template-columns: 140px 15px auto;
            margin-bottom: 4px;
            align-items: start;
        }

        .info-row span:first-child { font-weight: bold; }

        .out-makam { 
            text-align: center; 
            font-weight: bold; 
            margin: 60px 0 50px 0;
            text-transform: uppercase;
            font-size: 14pt;
            line-height: 1.3;
        }

        .out-metin { 
            text-indent: 1.5cm; 
            text-align: justify; 
            margin-bottom: 60px;
        }
        
        .out-imza-alani { 
            float: right; 
            text-align: center; 
            min-width: 6cm;
            margin-top: 10px;
        }

        .out-adsoyad-imza {
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 5px;
            font-size: 12pt;
        }

        .out-ekler { 
            margin-top: 100px; 
            font-size: 11pt; 
            clear: both;
        }

        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; }
            #dilekce-cikti { display: block !important; }
            @page { size: A4; margin: 0; }
        }
    </style>
</head>
<body>

    <div class="no-print">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Ana Sayfa</a>
        <div class="form-container">
            <div style="text-align: center; margin-bottom: 30px;">
                <h2 style="margin:0; color:var(--accent); font-size: 2rem;">Dilekçe Oluşturma Aracı</h2>
                <p style="color: #94a3b8; margin-top: 10px;">Resmi Kurum Formatında</p>
            </div>
            
            <div class="form-grid">
                <div><label>Ad Soyad</label><input type="text" id="adsoyad" oninput="buHarf(this)"></div>
                <div><label>T.C. Kimlik No</label><input type="text" id="tckimlik" maxlength="11"></div>
                <div><label>Kurum Sicil No</label><input type="text" id="sicil"></div>
                <div><label>Telefon No</label><input type="text" id="telefon"></div>
                <div class="full-width"><label>İkamet Adresi</label><textarea id="adres" rows="2"></textarea></div>
                
                <div class="full-width">
                    <label>Gideceği Makam</label>
                    <textarea id="makam" rows="2" placeholder="T.C. SİVAS VALİLİĞİNE" oninput="buHarf(this)"></textarea>
                </div>

                <div class="full-width">
                    <label>Dilekçe Metni</label>
                    <textarea id="metin" rows="8"></textarea>
                </div>

                <div class="full-width">
                    <label>Ekler (Her satıra bir tane)</label>
                    <textarea id="ekler" rows="2"></textarea>
                </div>

                <button class="btn-print" onclick="yazdir()">
                    <i class="fas fa-file-pdf"></i> DİLEKÇEYİ OLUŞTUR VE YAZDIR
                </button>
            </div>
        </div>
    </div>

    <div id="dilekce-cikti">
        <div class="out-tarih" id="p-tarih"></div>

        <div class="ust-bilgi-bloku">
            <div class="info-row"><span>ADI SOYADI</span><span>:</span><span id="p-adsoyad"></span></div>
            <div class="info-row"><span>T.C. KİMLİK NO</span><span>:</span><span id="p-tckimlik"></span></div>
            <div class="info-row"><span>SİCİL NO</span><span>:</span><span id="p-sicil"></span></div>
            <div class="info-row"><span>ADRES</span><span>:</span><span id="p-adres"></span></div>
            <div class="info-row"><span>TEL</span><span>:</span><span id="p-telefon"></span></div>
        </div>

        <div class="out-makam" id="p-makam"></div>

        <div class="out-metin" id="p-metin"></div>
        
        <div class="out-imza-alani">
            <div class="out-adsoyad-imza" id="p-adsoyad-imza"></div>
            <div>(İmza)</div>
        </div>

        <div class="out-ekler" id="p-ekler-alan" style="display:none;">
            <strong>EKLER:</strong><br>
            <span id="p-ekler" style="font-weight: normal; white-space: pre-line;"></span>
        </div>
    </div>

    <script>
        // Otomatik Büyük Harf Dönüştürücü (Resmi Evrak Şıklığı)
        function buHarf(input) {
            let start = input.selectionStart;
            let end = input.selectionEnd;
            input.value = input.value.toLocaleUpperCase('tr-TR');
            input.setSelectionRange(start, end);
        }

        function yazdir() {
            const bugun = new Date();
            document.getElementById('p-tarih').innerText = bugun.toLocaleDateString('tr-TR');

            const adSoyad = document.getElementById('adsoyad').value;
            document.getElementById('p-adsoyad').innerText = adSoyad;
            document.getElementById('p-adsoyad-imza').innerText = adSoyad;
            
            document.getElementById('p-tckimlik').innerText = document.getElementById('tckimlik').value;
            document.getElementById('p-sicil').innerText = document.getElementById('sicil').value;
            document.getElementById('p-adres').innerText = document.getElementById('adres').value;
            document.getElementById('p-telefon').innerText = document.getElementById('telefon').value;
            
            // Makam alanındaki satır sonlarını koru
            document.getElementById('p-makam').innerHTML = document.getElementById('makam').value.replace(/\n/g, '<br>');
            document.getElementById('p-metin').innerText = document.getElementById('metin').value;

            const ekText = document.getElementById('ekler').value;
            if(ekText.trim() !== "") {
                document.getElementById('p-ekler-alan').style.display = "block";
                document.getElementById('p-ekler').innerText = ekText;
            } else {
                document.getElementById('p-ekler-alan').style.display = "none";
            }

            window.print();
        }
    </script>
<footer>
        &copy; 2026 MAYAZGAN • Tüm Hakları Saklıdır.
</footer>
</body>
</html>

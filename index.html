<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAYAZGAN</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #020617;
            --box-bg: #1e293b;
            --text-main: #f1f5f9;
            --text-dim: #64748b;
            --cyan: #0ea5e9;
            --emerald: #10b981;
            --amber: #f59e0b;
            --rose: #f43f5e;
            --violet: #8b5cf6;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-image: radial-gradient(#1e293b 0.5px, transparent 0.5px);
            background-size: 30px 30px;
        }

        .header {
            text-align: center;
            margin-bottom: 45px;
        }

        .header h2 {
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.3));
        }

        .friv-container {
            display: grid;
            grid-template-columns: repeat(4, 120px); /* Kutular artık 120px, daha da tok! */
            gap: 18px;
            justify-content: center;
            perspective: 1000px;
        }

        .friv-box {
            width: 120px;
            height: 120px;
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(8px);
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .friv-box i { 
            font-size: 1.9rem;
            margin-bottom: 10px; 
            transition: 0.3s; 
        }

        .friv-box span {
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--text-dim);
            letter-spacing: 0.5px;
        }

        /* Renk Odaklı Hover Efektleri */
        .b-cyan:hover { border-color: var(--cyan); box-shadow: 0 0 30px rgba(14, 165, 233, 0.4); }
        .b-emerald:hover { border-color: var(--emerald); box-shadow: 0 0 30px rgba(16, 185, 129, 0.4); }
        .b-amber:hover { border-color: var(--amber); box-shadow: 0 0 30px rgba(245, 158, 11, 0.4); }
        .b-rose:hover { border-color: var(--rose); box-shadow: 0 0 30px rgba(244, 63, 94, 0.4); }
        .b-violet:hover { border-color: var(--violet); box-shadow: 0 0 30px rgba(139, 92, 246, 0.4); }

        .friv-box:hover {
            transform: scale(1.15) translateY(-8px);
            background: var(--box-bg);
            z-index: 10;
        }

        .friv-box:hover i { transform: scale(1.15); color: #fff !important; }
        .friv-box:hover span { color: #fff; }

        .empty { opacity: 0.1; cursor: default; }

        @media (max-width: 580px) {
            .friv-container { 
                grid-template-columns: repeat(3, 110px); 
                gap: 12px; 
            }
            .friv-box { width: 110px; height: 110px; }
            .header h1 { font-size: 2.2rem; }
        }

        footer {
            margin-top: 60px;
            font-size: 0.85rem;
            color: var(--text-dim);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <header class="header">
        <img src="mayazgan-logo.png" />
        <h2>MAYAZGAN</h2>
        <p style="color: var(--text-dim); font-size: 1.1rem; margin-top: 8px;">Dijital Portal</p>
    </header>

    <div class="friv-container">
        <a href="/muktesep-hesaplama" class="friv-box b-cyan" style="border-color: rgba(14, 165, 233, 0.3);">
            <i class="fas fa-calculator" style="color: var(--cyan);"></i>
            <span>Müktesep</span>
        </a>

        <a href="#" class="friv-box b-emerald">
            <i class="fas fa-hourglass-start" style="color: var(--emerald);"></i>
            <span>Tayin</span>
        </a>

        <a href="qr-generator.html" class="friv-box b-amber">
            <i class="fas fa-qrcode" style="color: var(--amber);"></i>
            <span>QR Kod</span>
        </a>

        <a href="mevzuat.html" class="friv-box b-violet">
            <i class="fas fa-gavel" style="color: var(--violet);"></i>
            <span>Mevzuat</span>
        </a>

        <a href="dilekce.html" class="friv-box b-rose">
            <i class="fas fa-pen-nib" style="color: var(--rose);"></i>
            <span>Dilekçe</span>
        </a>

       <a href="https://www.diyanet.gov.tr/tr-tr/Haberler/Indeks/19" target="_blank" class="friv-box b-cyan">
            <i class="fas fa-bullhorn" style="color: var(--cyan);"></i>
            <span>Duyurular</span>
</a>

        <div class="friv-box empty"></div>
        <div class="friv-box empty"></div>
        <div class="friv-box empty"></div>
        <div class="friv-box empty"></div>
        <div class="friv-box empty"></div>
        <div class="friv-box empty"></div>
    </div>

    <footer>
        &copy; 2026 MAYAZGAN • Dijital Çözümler
    </footer>

</body>
</html>

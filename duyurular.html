<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duyurular | MAYAZGAN Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #020617;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --text-dim: #64748b;
            --accent: #38bdf8;
            --live-red: #ef4444;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image: radial-gradient(#1e293b 0.5px, transparent 0.5px);
            background-size: 30px 30px;
        }

        .nav-bar {
            width: 100%;
            max-width: 700px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .back-btn { color: var(--text-dim); text-decoration: none; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; }
        .back-btn:hover { color: var(--accent); }

        .live-indicator { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; font-weight: bold; color: var(--live-red); text-transform: uppercase; }
        .dot { width: 8px; height: 8px; background-color: var(--live-red); border-radius: 50%; animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.5; } 100% { transform: scale(1); opacity: 1; } }

        .announcement-container { width: 100%; max-width: 700px; display: flex; flex-direction: column; gap: 12px; }

        .news-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 18px;
            text-decoration: none;
            display: grid;
            grid-template-columns: 60px 1fr;
            gap: 15px;
            transition: all 0.3s ease;
        }

        .news-card:hover {
            transform: translateX(10px);
            border-color: var(--accent);
            background: var(--card-bg);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .news-icon {
            width: 60px;
            height: 60px;
            background: rgba(56, 189, 248, 0.1);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            color: var(--accent);
        }

        .news-content h2 { margin: 0; font-size: 1.05rem; color: var(--text-main); line-height: 1.4; font-weight: 600; }
        .news-content .meta { margin-top: 5px; font-size: 0.75rem; color: var(--text-dim); display: flex; gap: 10px; }

        .loader { color: var(--text-dim); font-size: 0.9rem; margin-top: 40px; text-align: center; }
        
        footer { margin-top: 60px; color: var(--text-dim); font-size: 0.8rem; opacity: 0.6; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Portala Dön</a>
        <div class="live-indicator"><div class="dot"></div> DİB DUYURU TAKİP</div>
    </div>

    <div id="news-feed" class="announcement-container">
        <div class="loader">
            <i class="fas fa-spinner fa-spin"></i><br><br>
            Diyanet Duyuru İndeksi taranıyor...
        </div>
    </div>

    <script>
        async function fetchDiyanetAnnouncements() {
            const feedContainer = document.getElementById('news-feed');
            
            try {
                // İndeks 19 (Duyurular) için özel RSS çekimi
                // Not: Diyanet bazen kategori bazlı RSS'leri farklı pathlerde tutar, 
                // en sağlıklı sonucu genel duyuru akışından filtreleyerek alırız.
                const rssUrl = 'https://www.diyanet.gov.tr/tr-tr/Duyuru/Rss'; 
                const response = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}&api_key=your_api_key_optional`);
                const data = await response.json();

                if (data.status === 'ok') {
                    feedContainer.innerHTML = ''; 
                    
                    data.items.forEach(item => {
                        // Tarih formatlama
                        const pubDate = new Date(item.pubDate);
                        const dateStr = pubDate.toLocaleDateString('tr-TR', { day: '2-digit', month: 'long', year: 'numeric' });

                        const card = `
                            <a href="${item.link}" target="_blank" class="news-card">
                                <div class="news-icon"><i class="fas fa-bullhorn"></i></div>
                                <div class="news-content">
                                    <h2>${item.title}</h2>
                                    <div class="meta">
                                        <span><i class="far fa-calendar-alt"></i> ${dateStr}</span>
                                        <span><i class="fas fa-link"></i> Resmi Duyuru</span>
                                    </div>
                                </div>
                            </a>
                        `;
                        feedContainer.innerHTML += card;
                    });
                } else {
                    throw new Error();
                }
            } catch (error) {
                feedContainer.innerHTML = `
                    <div style="text-align:center; padding: 20px; border: 1px dashed var(--text-dim); border-radius: 20px;">
                        <p style="color:var(--text-dim);">Otomatik bağlantı şu an sağlanamadı.</p>
                        <a href="https://www.diyanet.gov.tr/tr-tr/Haberler/Indeks/19" target="_blank" 
                           style="color:var(--accent); text-decoration:none; font-weight:bold;">
                           Buraya Tıklayarak Resmi Sayfaya Gidebilirsiniz
                        </a>
                    </div>`;
            }
        }

        fetchDiyanetAnnouncements();
    </script>

    <footer>
        &copy; 2026 MAYAZGAN • Sivas/Gölova Dijital Hizmetler
    </footer>

</body>
</html>

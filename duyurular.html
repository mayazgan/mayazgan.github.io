<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı Duyurular | MAYAZGAN</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #020617;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --accent: #38bdf8;
            --live-red: #ef4444;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image: radial-gradient(#1e293b 0.5px, transparent 0.5px);
            background-size: 30px 30px;
        }

        .container { width: 100%; max-width: 700px; }

        /* Üst Başlık ve Geri Butonu */
        .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .back-btn { color: var(--text-dim); text-decoration: none; font-size: 0.9rem; }
        .live-tag { color: var(--live-red); font-size: 0.8rem; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .dot { width: 8px; height: 8px; background: var(--live-red); border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* Sabit Kritik Linkler (İK ve DİBBYS) */
        .fixed-links { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .fixed-card {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border: 2px solid var(--accent);
            padding: 15px;
            border-radius: 15px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.3s;
        }
        .fixed-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(56, 189, 248, 0.2); }
        .fixed-card i { color: var(--accent); font-size: 1.5rem; }
        .fixed-card span { color: #fff; font-weight: bold; font-size: 0.9rem; }

        /* Otomatik Haber Listesi */
        .news-title { font-size: 1.1rem; color: var(--accent); margin-bottom: 15px; display: block; border-left: 3px solid var(--accent); padding-left: 10px; }
        
        .news-item {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
            text-decoration: none;
            display: block;
            transition: 0.2s;
        }
        .news-item:hover { background: var(--card-bg); border-color: var(--accent); }
        .news-item h3 { margin: 0; font-size: 0.95rem; color: var(--text-main); line-height: 1.4; }
        .news-item small { color: var(--text-dim); font-size: 0.75rem; margin-top: 5px; display: block; }

        #news-loader { text-align: center; color: var(--text-dim); padding: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="nav-bar">
            <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Ana Sayfa</a>
            <div class="live-tag"><div class="dot"></div> CANLI AKIŞ</div>
        </div>

        <div class="fixed-links">
            <a href="https://insankaynaklari.diyanet.gov.tr/icerikler/Duyurular" target="_blank" class="fixed-card">
                <i class="fas fa-user-shield"></i>
                <span>İK Duyuruları</span>
            </a>
            <a href="https://dibbys.diyanet.gov.tr" target="_blank" class="fixed-card">
                <i class="fas fa-id-badge"></i>
                <span>DİBBYS Giriş</span>
            </a>
        </div>

        <span class="news-title">Resmi Duyurular (Otomatik)</span>
        
        <div id="news-feed">
            <div id="news-loader"><i class="fas fa-spinner fa-spin"></i> Veriler çekiliyor...</div>
        </div>
    </div>

    <script>
        async function fetchNews() {
            const feed = document.getElementById('news-feed');
            const rssUrl = 'https://www.diyanet.gov.tr/tr-tr/Duyuru/Rss';
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(rssUrl)}`;

            try {
                const response = await fetch(proxyUrl);
                const data = await response.json();
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(data.contents, "text/xml");
                const items = xmlDoc.querySelectorAll("item");

                if (items.length > 0) {
                    feed.innerHTML = '';
                    items.forEach((item, index) => {
                        if(index < 8) { // Sadece son 8 haberi göster
                            const title = item.querySelector("title").textContent;
                            const link = item.querySelector("link").textContent;
                            const date = item.querySelector("pubDate") ? item.querySelector("pubDate").textContent.split(' 00:00')[0] : "";
                            
                            feed.innerHTML += `
                                <a href="${link}" target="_blank" class="news-item">
                                    <h3>${title}</h3>
                                    <small><i class="far fa-calendar-alt"></i> ${date}</small>
                                </a>
                            `;
                        }
                    });
                }
            } catch (e) {
                feed.innerHTML = '<p style="color:var(--text-dim); text-align:center;">Diyanet haber akışına şu an ulaşılamıyor. Lütfen yukarıdaki butonları kullanın.</p>';
            }
        }
        fetchNews();
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duyuru Ekranı | MAYAZGAN</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #020617;
            --accent: #38bdf8;
            --text-dim: #94a3b8;
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
        }

        .header {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .back-link { color: var(--text-dim); text-decoration: none; font-size: 0.9rem; }

        /* iFrame Konteyneri */
        .frame-wrapper {
            width: 100%;
            max-width: 900px;
            height: 70vh;
            border: 2px solid #1e293b;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            background: #0f172a;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Hata Durumunda Görünecek Mesaj */
        .error-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0f172a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            z-index: 1;
        }

        .btn-direct {
            background: var(--accent);
            color: #020617;
            padding: 12px 25px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Portala Dön</a>
        <span style="color: var(--accent); font-weight: bold;">CANLI DUYURU PANELİ</span>
    </div>

    <div class="frame-wrapper">
        <div class="error-overlay">
            <i class="fas fa-shield-alt" style="font-size: 3rem; color: var(--text-dim); margin-bottom: 15px;"></i>
            <h3>Güvenlik Kısıtlaması</h3>
            <p>Diyanet güvenlik protokolleri nedeniyle sayfa bu pencerede açılamıyor.</p>
            <a href="https://insankaynaklari.diyanet.gov.tr/icerikler/Duyurular" target="_blank" class="btn-direct">
                SAYFAYI YENİ SEKMEDE AÇ
            </a>
        </div>

        <iframe src="https://insankaynaklari.diyanet.gov.tr/icerikler/Duyurular"></iframe>
    </div>

    <p style="margin-top: 20px; font-size: 0.8rem; color: var(--text-dim);">
        Not: Resmi kurum siteleri genellikle iFrame koruması kullanır.
    </p>

</body>
</html>

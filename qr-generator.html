<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Oluşturucu | MAYAZGAN</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg: #020617;
            --card-bg: #1e293b;
            --accent: #f59e0b;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(#1e293b 0.5px, transparent 0.5px);
            background-size: 30px 30px;
        }

        .container { width: 100%; max-width: 500px; margin-top: 50px; }

        .back-btn {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 30px;
        }

        .generator-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h1 { font-size: 1.5rem; margin-bottom: 20px; color: var(--accent); }

        .input-group { margin-bottom: 20px; }

        input {
            width: 100%;
            padding: 15px;
            background: #0f172a;
            border: 2px solid #334155;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(245, 158, 11, 0.2); }

        .btn-generate {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            border: none;
            border-radius: 12px;
            color: #020617;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-generate:hover { transform: scale(1.02); background: #fbbf24; }

        #qrcode {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            padding: 20px;
            background: white; /* QR okuması için şart */
            border-radius: 15px;
            display: none; /* İlk başta gizli */
        }

        .download-info {
            display: none;
            margin-top: 15px;
            font-size: 0.8rem;
            color: var(--text-dim);
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Ana Sayfa</a>

        <div class="generator-card">
            <h1>QR Kod Sihirbazı</h1>
            <p style="color: var(--text-dim); font-size: 0.85rem; margin-bottom: 20px;">
                Herhangi bir linki veya metni yazıp "Oluştur"a basın.<br>
                Lütfen! Türkçe karakter girmeyin!
            </p>
            
            <div class="input-group">
                <input type="text" id="qrText" placeholder="https://www.google.com">
            </div>
            
            <button class="btn-generate" onclick="makeQR()">KODU OLUŞTUR</button>

            <div id="qrcode"></div>
            <p id="info" class="download-info">QR Kodunuz hazır! Üzerine basılı tutarak veya sağ tıklayarak kaydedebilirsiniz.</p>
        </div>
    </div>

    <script>
        // QR Kod Nesnesini Hazırla
        var qrcode = new QRCode(document.getElementById("qrcode"), {
            width: 200,
            height: 200,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });

        function makeQR() {
            var elText = document.getElementById("qrText");
            
            if (!elText.value) {
                alert("Lütfen bir şeyler yazın!");
                elText.focus();
                return;
            }

            // Önceki QR'ı temizle ve yenisini yap
            qrcode.clear();
            qrcode.makeCode(elText.value);
            
            // Görünür yap
            document.getElementById("qrcode").style.display = "flex";
            document.getElementById("info").style.display = "block";
        }

        // Enter tuşu desteği
        document.getElementById("qrText").addEventListener("keyup", function(event) {
            if (event.keyCode === 13) {
                makeQR();
            }
        });
    </script>

</body>
</html>

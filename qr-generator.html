<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Oluşturucu | MAYAZGAN</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg: #020617;
            --card-bg: #1e293b;
            --accent: #f59e0b;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 450px; margin-top: 50px; }

        .back-btn {
            color: var(--text-dim);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 25px;
            font-size: 0.9rem;
        }

        .card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        input {
            width: 100%;
            padding: 15px;
            background: #0f172a;
            border: 2px solid #334155;
            border-radius: 12px;
            color: white;
            margin-bottom: 20px;
            box-sizing: border-box;
            outline: none;
        }

        input:focus { border-color: var(--accent); }

        .btn {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            border: none;
            border-radius: 12px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
        }

        #qrcode-container {
            margin-top: 25px;
            display: none; /* Başta gizli */
            background: white; /* QR'ın okunması için arka plan beyaz olmalı */
            padding: 20px;
            border-radius: 15px;
            justify-content: center;
        }

        #qrcode-container img { margin: 0 auto; }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Ana Sayfa</a>
        
        <div class="card">
            <h1 style="color:var(--accent); margin-top:0;">QR Sihirbazı</h1>
            <input type="text" id="textInput" placeholder="Link veya metin yazın...">
            <button class="btn" onclick="generate()">KODU OLUŞTUR</button>
            
            <div id="qrcode-container">
                <div id="qrcode"></div>
            </div>
            <p id="msg" style="display:none; color:var(--text-dim); font-size:0.8rem; margin-top:15px;">QR Kodunuz hazır! Üzerine basılı tutup kaydedebilirsiniz.</p>
        </div>
    </div>

    <script>
        // QR Motorunu ayarla
        var qrcode = new QRCode(document.getElementById("qrcode"), {
            width: 200,
            height: 200,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });

        function generate() {
            var input = document.getElementById("textInput");
            if (input.value.trim() === "") {
                alert("Boş bırakmayın!");
                return;
            }

            qrcode.clear(); // Eski kodu sil
            qrcode.makeCode(input.value); // Yenisini yap
            
            document.getElementById("qrcode-container").style.display = "flex";
            document.getElementById("msg").style.display = "block";
        }
    </script>
</body>
</html>

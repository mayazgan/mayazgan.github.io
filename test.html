<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAYAZGAN PORTAL | Akıllı Personel Sistemi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #020617;
            --box-bg: #1e293b;
            --text-main: #f1f5f9;
            --text-dim: #64748b;
            --cyan: #0ea5e9;
            --emerald: #10b981;
            --amber: #f59e0b;
            --rose: #f43f5e;
            --violet: #8b5cf6;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            /* Friv tarzı arka plan dokusu */
            background-image: radial-gradient(#1e293b 0.5px, transparent 0.5px);
            background-size: 24px 24px;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: -1px;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .friv-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            max-width: 520px;
            padding: 20px;
            perspective: 1000px;
        }

        .friv-box {
            aspect-ratio: 1 / 1;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
        }

        /* Her kutuya farklı bir parıltı rengi */
        .friv-box i { font-size: 1.6rem; margin-bottom: 6px; transition: 0.3s; }
        .b-cyan:hover { border-color: var(--cyan); box-shadow: 0 0 20px var(--cyan); }
        .b-emerald:hover { border-color: var(--emerald); box-shadow: 0 0 20px var(--emerald); }
        .b-amber:hover { border-color: var(--amber); box-shadow: 0 0 20px var(--amber); }
        .b-rose:hover { border-color: var(--rose); box-shadow: 0 0 20px var(--rose); }
        .b-violet:hover { border-color: var(--violet); box-shadow: 0 0 20px var(--violet); }

        .friv-box span {
            font-size: 0.6rem;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--text-dim);
            letter-spacing: 0.5px;
        }

        .friv-box:hover {
            transform: scale(1.15) rotate(2deg);
            background: var(--box-bg);
            z-index: 10;
        }

        .friv-box:hover i { transform: scale(1.2); color: #fff !important; }
        .friv-box:hover span { color: #fff; }

        /* Boş Kutular */
        .empty { opacity: 0.1; cursor: default; }

        /* Mobil Optimizasyon */
        @media (max-width: 480px) {
            .friv-container { grid-template-columns: repeat(3, 1fr); gap: 10px; }
            .header h1 { font-size: 1.8rem; }
        }

        footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: var(--text-dim);
            font-weight: 500;
        }
    </style>
</head>
<body>

    <header class="header">
        <h1>MAYAZGAN</h1>
        <p style="color: var(--text-dim); font-size: 0.9rem; margin-top: 5px;">Diyanet Personel Dijital Portalı</p>
    </header>

    <div class="friv-container">
        <a href="/muktesep-hesaplama" class="friv-box b-cyan" style="border-color: rgba(14, 165, 233, 0.3);">
            <i class="fas fa-calculator" style="color: var(--cyan);"></i>
            <span>Müktesep</span>
        </a>

        <a href="#" class="friv-box b-emerald">
            <i class="fas fa-history" style="color: var(--emerald);"></i>
            <span>Tayin</span>
        </a>

        <a href="#" class="friv-box b-amber">
            <i class="fas fa-qrcode" style="color: var(--amber);"></i>
            <span>QR Kod</span>
        </a>

        <a href="#" class="friv-box b-violet">
            <i class="fas fa-gavel" style="color: var(--violet);"></i>
            <span>Mevzuat</span>
        </a>

        <a href="#" class="friv-box b-rose">
            <i class="fas fa-pen-fancy" style="color: var(--rose);"></i>
            <span>Dilekçe</span>
        </a>

        <a href="#" class="friv-box b-cyan">
            <i class="fas fa-graduation-cap" style="color: var(--cyan);"></i>
            <span>Sınavlar</span>
        </a>

        <div class="friv-box empty"></div>
        <div class="friv-box empty"></div>
        <div class="friv-box empty"></div>
        <div class="friv-box empty"></div>
        <div class="friv-box empty"></div>
        <div class="friv-box empty"></div>
    </div>

    <footer>
        &copy; 2026 MAYAZGAN • Sivas/Gölova
    </footer>

</body>
</html>

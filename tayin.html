<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAYAZGAN | Akıllı Mevzuat Analizörü</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --accent: #00ff88;
            --accent-glow: rgba(0, 255, 136, 0.3);
            --bg: #060910;
            --panel: rgba(15, 23, 42, 0.6);
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        body {
            background: radial-gradient(circle at top right, #1e293b, var(--bg));
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 0;
            overflow-x: hidden;
        }

        /* --- MAYAZGAN PRESTIGE PANEL --- */
        .mayazgan-container { max-width: 800px; width: 90%; }

        .brand-section { text-center mb-5; animation: fadeInDown 1s ease; }
        .brand-logo {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            letter-spacing: 15px;
            background: linear-gradient(to right, #00ff88, #60efff, #00ff88);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
            text-shadow: 0 0 15px rgba(0,255,136,0.3);
        }

        .main-panel {
            background: var(--panel);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 40px;
            padding: 50px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.7), inset 0 0 20px rgba(255,255,255,0.02);
            position: relative;
            overflow: hidden;
        }
        .main-panel::before {
            content: ''; position: absolute; top: -2px; left: -2px; right: -2px; height: 3px;
            background: linear-gradient(to right, transparent, var(--accent), transparent);
            border-radius: 40px 40px 0 0;
        }

        /* --- INPUT STİLLERİ --- */
        .form-label {
            font-size: 0.7rem; font-weight: 800; color: var(--accent);
            letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px;
            display: flex; align-items: center; gap: 8px;
        }
        .input-group-text { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: var(--accent); border-radius: 15px 0 0 15px; }
        
        .custom-input {
            background: rgba(10, 15, 24, 0.9);
            border: 1px solid rgba(255,255,255,0.08);
            color: white; border-radius: 15px; padding: 15px; font-weight: 600;
            transition: var(--transition);
        }
        .custom-input:focus {
            background: #0a0f18; border-color: var(--accent); color: white;
            box-shadow: 0 0 20px var(--accent-glow);
        }
        .custom-input::placeholder { color: #475569; font-weight: 400; }

        .param-section {
            background: rgba(0,0,0,0.3); border-radius: 20px; padding: 25px;
            border: 1px solid rgba(255,255,255,0.05); margin-top: 30px;
        }

        /* --- HESAPLA BUTONU --- */
        .btn-mayazgan {
            background: linear-gradient(45deg, #00ff88, #00bd68);
            border: none; border-radius: 18px; padding: 20px;
            font-family: 'Orbitron', sans-serif; font-weight: 900;
            letter-spacing: 3px; color: #060910; text-transform: uppercase;
            margin-top: 35px; transition: var(--transition);
            box-shadow: 0 10px 30px rgba(0,255,136,0.3);
        }
        .btn-mayazgan:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 50px rgba(0,255,136,0.5);
            color: #060910;
        }

        /* --- SONUÇ RAPORU --- */
        .result-box { display: none; margin-top: 50px; animation: fadeInUp 0.6s ease; }
        .result-header {
            font-weight: 800; text-transform: uppercase; letter-spacing: 3px;
            color: #94a3b8; border-bottom: 2px solid #334155; padding-bottom: 10px;
        }

        .report-card {
            background: rgba(255,255,255,0.02); border-radius: 22px; padding: 25px;
            margin-bottom: 18px; border: 1px solid rgba(255,255,255,0.05);
            display: flex; align-items: flex-start; gap: 20px;
            transition: var(--transition);
        }
        .report-card:hover { background: rgba(255,255,255,0.05); transform: translateX(10px); }

        .icon-box {
            min-width: 50px; height: 50px; border-radius: 15px;
            display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
        }
        .report-text { font-size: 0.95rem; line-height: 1.6; }
        .muktesep-link {
            color: #60efff; text-decoration: none; font-weight: 700;
            border-bottom: 1px dashed #60efff; transition: 0.3s;
        }
        .muktesep-link:hover { color: #00ff88; border-bottom-color: #00ff88; }

        /* DURUM RENKLERİ */
        .status-ok { color: #00ff88; background: rgba(0,255,136,0.1); border: 1px solid rgba(0,255,136,0.2); }
        .status-wait { color: #fbbf24; background: rgba(251,191,36,0.1); border: 1px solid rgba(251,191,36,0.2); }
        .status-no { color: #f87171; background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.2); }

        /* --- ANİMASYONLAR --- */
        @keyframes shine { to { background-position: 200% center; } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* MOBİL UYUM */
        @media (max-width: 768px) {
            .main-panel { padding: 30px; border-radius: 30px; }
            .brand-logo { letter-spacing: 8px; font-size: 2rem; }
            .report-card { flex-direction: column; align-items: center; text-align: center; }
        }
    </style>
</head>
<body>

<div class="mayazgan-container">
    <div class="brand-section text-center">
        <h1 class="brand-logo display-4">MAYAZGAN</h1>
        <p class="text-muted fw-bold small text-uppercase tracking-widest mt-2" style="letter-spacing: 5px;">
            AKILLI PERSONEL MEVZUAT ANALİZÖRÜ
        </p>
    </div>

    <div class="main-panel">
        <div class="row g-4">
            <div class="col-md-6">
                <label class="form-label"><i class="fas fa-map-marker-alt"></i>Bulunulan Yer Başlama</label>
                <input type="date" id="locStart" class="form-control custom-input">
                <small class="text-muted" style="font-size: 0.6rem;">Şehir içi (6 ay) ve il dışı (2 yıl) süreleri için.</small>
            </div>
            <div class="col-md-6">
                <label class="form-label"><i class="fas fa-mosque"></i>Diyanet Görev Başlangıcı</label>
                <input type="date" id="dibStart" class="form-control custom-input">
                <small class="text-muted" style="font-size: 0.6rem;">3+1 Sözleşme bitişi (4 yıl) için.</small>
            </div>

            <div class="col-12 param-section">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label"><i class="fas fa-star"></i>MBSTS Puanı</label>
                        <input type="number" id="mbsts" class="form-control custom-input" placeholder="Örn: 68">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label"><i class="fas fa-user-shield"></i>Askerlik Süresi (Gün)</label>
                        <input type="number" id="milDays" class="form-control custom-input" placeholder="Düşülecek toplam gün">
                    </div>
                </div>
            </div>

            <div class="col-12">
                <button onclick="analizEt()" class="btn btn-mayazgan w-100 shadow-lg">MEVZUATI SORGULA</button>
            </div>
        </div>

        <div id="resultBox" class="result-box">
            <div class="result-header text-center mb-4 fs-6">SİSTEM ANALİZ RAPORU</div>
            <div id="output"></div>
        </div>
    </div>
    
    <div class="text-center mt-5 text-muted small opacity-40">MAYAZGAN Prestige &copy; 2026 | Sivas</div>
</div>

<script>
    function analizEt() {
        const locVal = document.getElementById('locStart').value;
        const dibVal = document.getElementById('dibStart').value;
        const score = parseInt(document.getElementById('mbsts').value) || 0;
        const milDays = parseInt(document.getElementById('milDays').value) || 0;

        if(!locVal || !dibVal) return alert("Hocam, tarihleri boş geçmeyelim.");

        const today = new Date();
        const oneDay = 1000 * 60 * 60 * 24;

        // Bulunulan Yer Hesaplaması (Net)
        let locDiff = today - new Date(locVal);
        let netLocDays = Math.ceil(locDiff / oneDay) - milDays;
        let netLocMonths = netLocDays / 30.44;
        let netLocYears = netLocDays / 365;

        // Diyanet Toplam Hesaplaması (Net)
        let dibDiff = today - new Date(dibVal);
        let netDibDays = Math.ceil(dibDiff / oneDay) - milDays;
        let netDibYears = netDibDays / 365;

        const container = document.getElementById('resultBox');
        container.style.display = 'block';
        const out = document.getElementById('output');
        out.innerHTML = "";

        // JS ile yumuşak kaydırma
        window.scrollTo({ top: container.offsetTop - 50, behavior: 'smooth' });

        const hasPuan = score >= 50;

        // RAPORLAMA BAŞLIYOR
        
        // 1. Şehir İçi Hakkı (Bulunulan yer baz alınır)
        if(netLocMonths >= 6) {
            let locTarih = new Date(locVal);
            locTarih.setDate(locTarih.getDate() + 182 + milDays); // 6 ay + askerlik
            
            render("fa-check-double", `Şehir içi yer değişikliği hakkınız aktif. <small class="text-muted">(Net yer süresi: ${Math.floor(netLocDays)} gün)</small>`, "status-ok");
            
            if(hasPuan) {
                render("fa-file-signature", `MBSTS Puanı (${score}) yeterli. <a href="muktesep_hesaplama.html" class="muktesep-link">Müktesep Puanınız</a> tutuyorsa DİBBYS, tutmuyorsa 18/A-1(ç) ile işlem yapabilirsiniz.`, "status-ok");
            } else {
                render("fa-ban", `Puan yetersiz (${score}). Ne DİBBYS başvurusu ne de 18/A dilekçesi hakkınız bulunmuyor.`, "status-no");
            }
        } else {
            let locTarih = new Date(locVal);
            locTarih.setDate(locTarih.getDate() + 182 + milDays); 
            render("fa-clock", `Şehir içi nakil için ${Math.ceil(182 - netLocDays)} gün daha yerinizde kalmalısınız. (Muhtemel Tarih: ${locTarih.toLocaleDateString('tr-TR')})`, "status-wait");
        }

        // 2. Şehir Dışı (2 Yıl Kuralı - Bulunulan yer baz alınır)
        if(netLocYears >= 2) {
            render("fa-map-signs", "Mevcut şehirde 2 yılınız dolmuş: Şehir dışı tayin talebi hakkınız açıldı.", "status-ok");
        } else {
            render("fa-hourglass-end", `Şehir dışı tayin hakkına (2 yıl şartı) ${Math.ceil((2*365) - netLocDays)} gün kaldı.`, "status-wait");
        }

        // 3. 4 Yıl Kuralı (Diyanet Toplam baz alınır)
        if(netDibYears >= 4) {
            render("fa-user-check", "Diyanet'te 4 yılınız doldu: 3+1 sürecini tamamladınız, şehir dışı geçişlerde tam serbestlik.", "status-ok");
        } else {
            let dibTarih = new Date(dibVal);
            dibTarih.setDate(dibTarih.getDate() + (4*365) + milDays);
            render("fa-shield-alt", `Kadrolu geçiş ve tam serbestlik (4 yıl) için ${Math.ceil((4*365) - netDibDays)} gün kaldı. (Muhtemel Tarih: ${dibTarih.toLocaleDateString('tr-TR')})`, "status-wait");
        }
    }

    function render(icon, text, cls) {
        const div = document.createElement('div');
        div.className = 'report-card';
        div.innerHTML = `
            <div class="icon-box ${cls}"><i class="fas ${icon}"></i></div>
            <div class="report-text fw-bold mb-0">${text}</div>
        `;
        document.getElementById('output').appendChild(div);
    }
</script>

</body>
</html>

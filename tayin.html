<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAYAZGAN | Kesin Mevzuat Analizi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
    :root {
        --mayazgan-green: #00ff88;
        --mayazgan-dark-green: #00bd68;
        --bg-deep: #05070a;
        --card-bg: #0f141e;
        --input-bg: #05070a;
        --border-color: #1e293b;
        --text-high: #ffffff;
        --text-low: #94a3b8;
    }

    body { 
        background-color: var(--bg-deep); 
        color: var(--text-high); 
        font-family: 'Inter', 'Roboto', sans-serif; 
        padding: 40px 0;
        line-height: 1.6;
    }

    .container { max-width: 800px; }
    
    .brand-header {
        font-family: 'Orbitron', sans-serif;
        letter-spacing: 12px;
        color: var(--mayazgan-green);
        text-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
        font-weight: 900;
        margin-bottom: 40px;
        text-align: center;
    }

    /* Ana Panel - Derinlik ve Kontrast Artırıldı */
    .main-card {
        background: var(--card-bg);
        border: 1px solid var(--border-color);
        border-radius: 28px;
        padding: 45px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
    }

    .section-label {
        color: var(--mayazgan-green);
        font-size: 0.75rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    /* Input Alanları - Net Okunabilirlik */
    .custom-input {
        background: var(--input-bg) !important;
        border: 2px solid var(--border-color) !important;
        color: var(--text-high) !important;
        border-radius: 14px !important;
        padding: 14px !important;
        font-weight: 600;
        transition: all 0.3s ease;
    }

    .custom-input:focus {
        border-color: var(--mayazgan-green) !important;
        box-shadow: 0 0 15px rgba(0, 255, 136, 0.15) !important;
        background-color: #000 !important;
        outline: none;
    }

    /* Askerlik Bölgesi - Özel Vurgu */
    .military-zone {
        background: rgba(0, 0, 0, 0.25);
        border: 1px solid var(--border-color);
        border-radius: 20px;
        padding: 25px;
        margin: 30px 0;
    }

    /* Hesapla Butonu - Premium Görünüm */
    .btn-mayazgan {
        background: linear-gradient(135deg, var(--mayazgan-green), var(--mayazgan-dark-green));
        color: #000;
        font-weight: 900;
        font-family: 'Orbitron', sans-serif;
        letter-spacing: 3px;
        padding: 20px;
        border-radius: 16px;
        border: none;
        width: 100%;
        margin-top: 25px;
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        box-shadow: 0 10px 20px rgba(0, 255, 136, 0.2);
        text-transform: uppercase;
    }

    .btn-mayazgan:hover { 
        background: var(--mayazgan-green); 
        transform: translateY(-3px);
        box-shadow: 0 15px 30px rgba(0, 255, 136, 0.4);
    }

    /* Rapor Maddeleri - Keskinleştirilmiş Durumlar */
    .report-item {
        background: #161d29;
        border-radius: 18px;
        padding: 22px;
        margin-bottom: 18px;
        border-left: 5px solid var(--border-color);
        display: flex;
        align-items: center;
        transition: transform 0.3s ease;
    }

    .report-item:hover {
        transform: translateX(8px);
    }

    .report-ok { border-left-color: var(--mayazgan-green); }
    .report-wait { border-left-color: #f59e0b; }
    .report-no { border-left-color: #ef4444; }

    .report-item span {
        font-size: 0.95rem;
        font-weight: 600;
        color: var(--text-high);
    }

    /* Müktesep Bağlantısı */
    .muktesep-btn {
        color: #60efff;
        text-decoration: none;
        font-weight: 700;
        border-bottom: 1px dashed #60efff;
        transition: 0.3s;
    }

    .muktesep-btn:hover {
        color: var(--mayazgan-green);
        border-bottom-color: var(--mayazgan-green);
    }

    /* Scrollbar Güzelleştirme */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-deep); }
    ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--mayazgan-green); }
    </style>
</head>
<body>

<div class="container">
    <div class="text-center">
        <h1 class="brand-header">MAYAZGAN</h1>
        <p class="text-muted small mb-4">GELİŞMİŞ TAYİN HESAPLAMA SİSTEMİ</p>
    </div>

    <div class="main-card">
        <div class="row g-3">
            <div class="col-md-6">
                <label class="section-label">📍 Bulunulan Yer Başlama</label>
                <input type="date" id="locStart" class="form-control custom-input">
            </div>
            <div class="col-md-6">
                <label class="section-label">🕌 Diyanet Görev Başlangıcı</label>
                <input type="date" id="dibStart" class="form-control custom-input">
            </div>

            <div class="col-12 military-zone">
                <label class="section-label text-white mb-3"><i class="fas fa-user-shield me-2"></i>Askerlik Bilgileri</label>
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="small text-muted">Askere Gidiş</label>
                        <input type="date" id="milGo" class="form-control custom-input">
                    </div>
                    <div class="col-md-4">
                        <label class="small text-muted">Göreve Dönüş</label>
                        <input type="date" id="milReturn" class="form-control custom-input">
                    </div>
                    <div class="col-md-4">
                        <label class="small text-muted">Askerlik Sonrası İzin (Gün)</label>
                        <input type="number" id="milLeave" class="form-control custom-input" placeholder="Maks 30" max="30">
                    </div>
                </div>
            </div>

            <div class="col-12">
                <label class="section-label">⭐ MBSTS Puanı</label>
                <input type="number" id="mbsts" class="form-control custom-input" placeholder="Puanınızı girin">
            </div>

            <button onclick="hesapla()" class="btn btn-mayazgan">ANALİZİ BAŞLAT</button>
        </div>

        <div id="results" class="mt-5" style="display: none;">
            <h5 class="fw-bold mb-3 border-bottom pb-2">HAKLARINIZ VE DURUMUNUZ</h5>
            <div id="output"></div>
        </div>
    </div>
</div>

<script>
    function hesapla() {
        const locVal = document.getElementById('locStart').value;
        const dibVal = document.getElementById('dibStart').value;
        const milGo = document.getElementById('milGo').value;
        const milReturn = document.getElementById('milReturn').value;
        const milLeave = parseInt(document.getElementById('milLeave').value) || 0;
        const mbsts = parseInt(document.getElementById('mbsts').value) || 0;

        if(!locVal || !dibVal) return alert("Hocam başlangıç tarihlerini girin.");

        const today = new Date();
        const oneDay = 1000 * 60 * 60 * 24;

        // Askerlik Süresi Hesaplama
        let milDuration = 0;
        if(milGo && milReturn) {
            milDuration = (new Date(milReturn) - new Date(milGo)) / oneDay;
        }
        
        // Toplam Düşülecek Süre: Askerlik süresi + Kullanılan İzin (Maks 30)
        let totalOutTime = milDuration + Math.min(milLeave, 30);

        // Net Yer Süresi (6 ay ve 2 yıl için)
        let netLocDays = Math.ceil((today - new Date(locVal)) / oneDay) - totalOutTime;
        let netDibDays = Math.ceil((today - new Date(dibVal)) / oneDay) - totalOutTime;

        document.getElementById('results').style.display = 'block';
        const out = document.getElementById('output');
        out.innerHTML = "";

        const hasPuan = mbsts >= 50;

        // 1. Şehir İçi (6 Ay Kuralı)
        // 6 ay (182 gün) üzerine 1 ay (30 gün) izin payıyla 7 ay (212 gün) üzerinden de kontrol
        if(netLocDays >= 182) {
            render("✅ Şehir içi yer değişikliği hakkınız aktif.", "report-ok");
            if(hasPuan) {
                render(`✅ MBSTS yeterli. <a href="muktesep.html" class="muktesep-btn">Müktesep</a> uygunsa DİBBYS, değilse 18/A dilekçe verebilirsiniz.`, "report-ok");
            } else {
                render("❌ MBSTS 50 altı olduğu için tercih veya dilekçe hakkı bulunmuyor.", "report-no");
            }
        } else {
            let kalan = 182 - netLocDays;
            render(`⏳ Şehir içi hak için ${Math.ceil(kalan)} gün daha net görev süresi gerekli.`, "report-wait");
        }

        // 2. Şehir Dışı (2 Yıl)
        if(netLocDays >= 730) {
            render("✅ Mevcut ilde 2 yıl net süreniz doldu: Şehir dışı tayin açıldı.", "report-ok");
        } else {
            render(`⏳ Şehir dışı (2 yıl) hakkına ${Math.ceil(730 - netLocDays)} gün kaldı.`, "report-wait");
        }

        // 3. 4 Yıl (Kadro/Tam Serbestlik)
        if(netDibDays >= 1460) {
            render("🔥 4 yıl net görev süresi doldu: Tam tayin serbestliği.", "report-ok");
        } else {
            render(`⏳ 4 yılın (Kadro hakkı) dolmasına ${Math.ceil(1460 - netDibDays)} gün kaldı.`, "report-wait");
        }
    }

    function render(text, cls) {
        const div = document.createElement('div');
        div.className = `report-item ${cls}`;
        div.innerHTML = `<span class="fw-bold text-white">${text}</span>`;
        document.getElementById('output').appendChild(div);
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAYAZGAN | Kesin Mevzuat Analizi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --mayazgan-green: #00ff88;
            --dark-panel: #111827;
            --text-high: #ffffff;
            --text-low: #9ca3af;
        }
        body { 
            background-color: #030712; 
            color: var(--text-high); 
            font-family: 'Roboto', sans-serif; 
            padding: 20px 0;
        }
        .container { max-width: 750px; }
        
        .brand-header {
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 10px;
            color: var(--mayazgan-green);
            text-shadow: 0 0 10px rgba(0,255,136,0.3);
            font-weight: 900;
            margin-bottom: 30px;
        }

        /* Okunabilirliği Artırılmış Panel */
        .main-card {
            background: var(--dark-panel);
            border: 2px solid #1f2937;
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .section-label {
            color: var(--mayazgan-green);
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
            display: block;
        }

        .custom-input {
            background: #030712;
            border: 2px solid #374151;
            color: white !important;
            border-radius: 12px;
            padding: 12px;
            font-weight: 700;
        }
        .custom-input:focus {
            border-color: var(--mayazgan-green);
            box-shadow: none;
            background: #000;
        }

        .military-zone {
            background: rgba(0,0,0,0.3);
            border: 1px dashed #374151;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
        }

        .btn-mayazgan {
            background: var(--mayazgan-green);
            color: #000;
            font-weight: 900;
            font-family: 'Orbitron', sans-serif;
            padding: 18px;
            border-radius: 12px;
            border: none;
            width: 100%;
            margin-top: 20px;
            transition: 0.3s;
        }
        .btn-mayazgan:hover { background: #00cc6d; transform: scale(1.01); }

        .report-item {
            background: #1f2937;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 6px solid #374151;
        }
        .report-ok { border-left-color: var(--mayazgan-green); }
        .report-wait { border-left-color: #f59e0b; }
        .report-no { border-left-color: #ef4444; }

        .muktesep-btn {
            color: #60efff;
            text-decoration: underline;
            font-weight: 700;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="text-center">
        <h1 class="brand-header">MAYAZGAN</h1>
        <p class="text-muted small mb-4">GELİŞMİŞ TAYİN HESAPLAMA SİSTEMİ</p>
    </div>

    <div class="main-card">
        <div class="row g-3">
            <div class="col-md-6">
                <label class="section-label">📍 Bulunulan Yer Başlama</label>
                <input type="date" id="locStart" class="form-control custom-input">
            </div>
            <div class="col-md-6">
                <label class="section-label">🕌 Diyanet Görev Başlangıcı</label>
                <input type="date" id="dibStart" class="form-control custom-input">
            </div>

            <div class="col-12 military-zone">
                <label class="section-label text-white mb-3"><i class="fas fa-user-shield me-2"></i>Askerlik Bilgileri</label>
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="small text-muted">Askere Gidiş</label>
                        <input type="date" id="milGo" class="form-control custom-input">
                    </div>
                    <div class="col-md-4">
                        <label class="small text-muted">Göreve Dönüş</label>
                        <input type="date" id="milReturn" class="form-control custom-input">
                    </div>
                    <div class="col-md-4">
                        <label class="small text-muted">Askerlik Sonrası İzin (Gün)</label>
                        <input type="number" id="milLeave" class="form-control custom-input" placeholder="Maks 30" max="30">
                    </div>
                </div>
            </div>

            <div class="col-12">
                <label class="section-label">⭐ MBSTS Puanı</label>
                <input type="number" id="mbsts" class="form-control custom-input" placeholder="Puanınızı girin">
            </div>

            <button onclick="hesapla()" class="btn btn-mayazgan">ANALİZİ BAŞLAT</button>
        </div>

        <div id="results" class="mt-5" style="display: none;">
            <h5 class="fw-bold mb-3 border-bottom pb-2">HAKLARINIZ VE DURUMUNUZ</h5>
            <div id="output"></div>
        </div>
    </div>
</div>

<script>
    function hesapla() {
        const locVal = document.getElementById('locStart').value;
        const dibVal = document.getElementById('dibStart').value;
        const milGo = document.getElementById('milGo').value;
        const milReturn = document.getElementById('milReturn').value;
        const milLeave = parseInt(document.getElementById('milLeave').value) || 0;
        const mbsts = parseInt(document.getElementById('mbsts').value) || 0;

        if(!locVal || !dibVal) return alert("Hocam başlangıç tarihlerini girin.");

        const today = new Date();
        const oneDay = 1000 * 60 * 60 * 24;

        // Askerlik Süresi Hesaplama
        let milDuration = 0;
        if(milGo && milReturn) {
            milDuration = (new Date(milReturn) - new Date(milGo)) / oneDay;
        }
        
        // Toplam Düşülecek Süre: Askerlik süresi + Kullanılan İzin (Maks 30)
        let totalOutTime = milDuration + Math.min(milLeave, 30);

        // Net Yer Süresi (6 ay ve 2 yıl için)
        let netLocDays = Math.ceil((today - new Date(locVal)) / oneDay) - totalOutTime;
        let netDibDays = Math.ceil((today - new Date(dibVal)) / oneDay) - totalOutTime;

        document.getElementById('results').style.display = 'block';
        const out = document.getElementById('output');
        out.innerHTML = "";

        const hasPuan = mbsts >= 50;

        // 1. Şehir İçi (6 Ay Kuralı)
        // 6 ay (182 gün) üzerine 1 ay (30 gün) izin payıyla 7 ay (212 gün) üzerinden de kontrol
        if(netLocDays >= 182) {
            render("✅ Şehir içi yer değişikliği hakkınız aktif.", "report-ok");
            if(hasPuan) {
                render(`✅ MBSTS yeterli. <a href="muktesep.html" class="muktesep-btn">Müktesep</a> uygunsa DİBBYS, değilse 18/A dilekçe verebilirsiniz.`, "report-ok");
            } else {
                render("❌ MBSTS 50 altı olduğu için tercih veya dilekçe hakkı bulunmuyor.", "report-no");
            }
        } else {
            let kalan = 182 - netLocDays;
            render(`⏳ Şehir içi hak için ${Math.ceil(kalan)} gün daha net görev süresi gerekli.`, "report-wait");
        }

        // 2. Şehir Dışı (2 Yıl)
        if(netLocDays >= 730) {
            render("✅ Mevcut ilde 2 yıl net süreniz doldu: Şehir dışı tayin açıldı.", "report-ok");
        } else {
            render(`⏳ Şehir dışı (2 yıl) hakkına ${Math.ceil(730 - netLocDays)} gün kaldı.`, "report-wait");
        }

        // 3. 4 Yıl (Kadro/Tam Serbestlik)
        if(netDibDays >= 1460) {
            render("🔥 4 yıl net görev süresi doldu: Tam tayin serbestliği.", "report-ok");
        } else {
            render(`⏳ 4 yılın (Kadro hakkı) dolmasına ${Math.ceil(1460 - netDibDays)} gün kaldı.`, "report-wait");
        }
    }

    function render(text, cls) {
        const div = document.createElement('div');
        div.className = `report-item ${cls}`;
        div.innerHTML = `<span class="fw-bold text-white">${text}</span>`;
        document.getElementById('output').appendChild(div);
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAYAZGAN | Profesyonel Tayin Analizi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #00ff88; --bg: #0a0f18; --panel: rgba(30, 41, 59, 0.8); }
        body { background: radial-gradient(circle at top right, #1e293b, var(--bg)); color: #e2e8f0; font-family: 'Inter', sans-serif; min-height: 100vh; padding: 40px 0; }
        .glass-panel { background: var(--panel); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 35px; padding: 45px; box-shadow: 0 30px 60px rgba(0,0,0,0.6); }
        .brand { font-family: 'Orbitron', sans-serif; letter-spacing: 10px; background: linear-gradient(to right, #00ff88, #60efff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
        .form-label { font-size: 0.75rem; font-weight: 700; color: var(--accent); letter-spacing: 1px; margin-top: 15px; text-transform: uppercase; }
        .custom-input { background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 14px; padding: 12px; }
        .custom-input:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(0,255,136,0.3); background: #0f172a; color: white; }
        .section-title { font-size: 0.85rem; color: #94a3b8; border-bottom: 1px solid #334155; padding-bottom: 5px; margin-top: 25px; font-weight: 800; }
        .btn-mayazgan { background: linear-gradient(45deg, #00ff88, #00bd68); border: none; border-radius: 15px; padding: 18px; font-weight: 900; color: #0a0f18; margin-top: 30px; letter-spacing: 2px; }
        .btn-mayazgan:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0,255,136,0.4); }
        .report-card { border-radius: 20px; padding: 20px; margin-bottom: 15px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .report-card:hover { background: rgba(255,255,255,0.05); }
        .status-ok { color: #00ff88; } .status-wait { color: #fbbf24; } .status-no { color: #f87171; }
        .muktesep-link { color: #60efff; text-decoration: none; border-bottom: 1px dashed; }
    </style>
</head>
<body>

<div class="container" style="max-width: 800px;">
    <div class="text-center mb-5">
        <h1 class="brand display-5">MAYAZGAN</h1>
        <p class="text-muted small fw-bold tracking-widest">GELİŞMİŞ TAYİN VE MEVZUAT ANALİZÖRÜ</p>
    </div>

    <div class="glass-panel shadow-2xl">
        <div class="row g-4">
            <div class="col-md-6">
                <label class="form-label"><i class="fas fa-map-marker-alt me-2"></i>Bulunulan Yer Başlama</label>
                <input type="date" id="locStart" class="form-control custom-input">
                <small class="text-muted" style="font-size: 0.65rem;">Şehir içi ve il dışı tayin süreleri için.</small>
            </div>
            <div class="col-md-6">
                <label class="form-label"><i class="fas fa-mosque me-2"></i>Diyanet Görev Başlangıcı</label>
                <input type="date" id="dibStart" class="form-control custom-input">
                <small class="text-muted" style="font-size: 0.65rem;">3+1 Kadro ve genel haklar için.</small>
            </div>

            <div class="col-12 section-title">EK PARAMETRELER</div>

            <div class="col-md-6">
                <label class="form-label"><i class="fas fa-star me-2"></i>MBSTS Puanı</label>
                <input type="number" id="mbsts" class="form-control custom-input" placeholder="Örn: 65">
            </div>
            
            <div class="col-md-6">
                <label class="form-label"><i class="fas fa-user-shield me-2"></i>Askerlik Süresi (Gün)</label>
                <input type="number" id="milDays" class="form-control custom-input" placeholder="Düşülecek toplam gün">
            </div>

            <div class="col-12">
                <button onclick="analizEt()" class="btn btn-mayazgan w-100">HESAPLA VE RAPORLA</button>
            </div>
        </div>

        <div id="resultBox" class="mt-5" style="display: none;">
            <div class="alert alert-dark border-secondary py-2 text-center small text-uppercase fw-bold mb-4" style="letter-spacing: 2px; background: #0f172a;">
                Mevzuat Analiz Sonucu
            </div>
            <div id="output"></div>
        </div>
    </div>
    
    <div class="text-center mt-4 opacity-40 small">MAYAZGAN Lab &copy; 2026 | Sivas</div>
</div>

<script>
    function analizEt() {
        const locVal = document.getElementById('locStart').value;
        const dibVal = document.getElementById('dibStart').value;
        const score = parseInt(document.getElementById('mbsts').value) || 0;
        const milDays = parseInt(document.getElementById('milDays').value) || 0;

        if(!locVal || !dibVal) return alert("Hocam, tarihleri boş geçmeyelim.");

        const today = new Date();
        const oneDay = 1000 * 60 * 60 * 24;

        // Bulunulan Yer Hesaplaması (Net)
        let locDiff = today - new Date(locVal);
        let netLocDays = Math.ceil(locDiff / oneDay) - milDays;
        let netLocMonths = netLocDays / 30.44;
        let netLocYears = netLocDays / 365;

        // Diyanet Toplam Hesaplaması (Net)
        let dibDiff = today - new Date(dibVal);
        let netDibDays = Math.ceil(dibDiff / oneDay) - milDays;
        let netDibYears = netDibDays / 365;

        document.getElementById('resultBox').style.display = 'block';
        const out = document.getElementById('output');
        out.innerHTML = "";

        const hasPuan = score >= 50;

        // RAPORLAMA BAŞLIYOR
        
        // 1. Şehir İçi Hakkı (Bulunulan yer baz alınır)
        if(netLocMonths >= 6) {
            render("fa-check-double", `Şehir içi yer değişikliği hakkınız aktif. (Net yer süresi: ${Math.floor(netLocDays)} gün)`, "status-ok");
            if(hasPuan) {
                render("fa-file-alt", `MBSTS (${score}) yeterli. <a href="muktesep_hesaplama.html" class="muktesep-link">Müktesep Puanınız</a> tutuyorsa DİBBYS, tutmuyorsa 18/A-1(ç) ile işlem yapabilirsiniz.`, "status-ok");
            } else {
                render("fa-ban", "MBSTS 50 altı olduğu için tercih veya 18/A dilekçesi hakkınız bulunmuyor.", "status-no");
            }
        } else {
            render("fa-clock", `Şehir içi nakil için ${Math.ceil(182 - netLocDays)} gün daha yerinizde kalmalısınız.`, "status-wait");
        }

        // 2. Şehir Dışı (2 Yıl Kuralı - Bulunulan yer baz alınır)
        if(netLocYears >= 2) {
            render("fa-map-signs", "Mevcut şehirde 2 yılınız dolmuş: Şehir dışı tayin talebi hakkınız açıldı.", "status-ok");
        } else {
            render("fa-hourglass-end", `Şehir dışı tayin hakkına (2 yıl şartı) ${Math.ceil((2*365) - netLocDays)} gün kaldı.`, "status-wait");
        }

        // 3. 4 Yıl Kuralı (Diyanet Toplam baz alınır)
        if(netDibYears >= 4) {
            render("fa-user-check", "Diyanet'te 4 yılınız doldu: 3+1 sürecini tamamladınız, şehir dışı geçişlerde tam serbestlik.", "status-ok");
        } else {
            render("fa-shield-alt", `Kadrolu geçiş ve tam serbestlik (4 yıl) için ${Math.ceil((4*365) - netDibDays)} gün kaldı.`, "status-wait");
        }
    }

    function render(icon, text, cls) {
        const div = document.createElement('div');
        div.className = 'report-card d-flex align-items-center gap-3';
        div.innerHTML = `<i class="fas ${icon} ${cls} fs-4"></i><div class="small fw-bold">${text}</div>`;
        document.getElementById('output').appendChild(div);
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAYAZGAN | Kesin Mevzuat Analizörü</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --mayazgan-green: #00ff88;
            --mayazgan-dark-green: #00bd68;
            --bg-deep: #05070a;
            --card-bg: #0f141e;
            --input-bg: #05070a;
            --border-color: #1e293b;
            --text-high: #ffffff;
            --text-low: #cbd5e1; /* Beyaza yakın gri */
        }

        body { 
            background-color: var(--bg-deep); 
            color: var(--text-high); 
            font-family: 'Inter', sans-serif; 
            padding: 40px 0;
            line-height: 1.6;
        }

        .container { max-width: 800px; }
        
        .brand-header {
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 12px;
            color: var(--mayazgan-green);
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
            font-weight: 900;
            margin-bottom: 40px;
            text-align: center;
        }

        .main-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 28px;
            padding: 45px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
        }

        .section-label {
            color: var(--mayazgan-green);
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .custom-input {
            background: var(--input-bg) !important;
            border: 2px solid var(--border-color) !important;
            color: var(--text-high) !important;
            border-radius: 14px !important;
            padding: 14px !important;
            font-weight: 600;
        }

        .custom-input:focus {
            border-color: var(--mayazgan-green) !important;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.15) !important;
            outline: none;
        }

        .info-text {
            color: var(--text-low);
            font-size: 0.75rem;
            font-weight: 500;
            margin-top: 5px;
            display: block;
        }

        .military-zone {
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 25px;
            margin: 30px 0;
        }

        .back-btn {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 30px;
        }

        .btn-mayazgan {
            background: linear-gradient(135deg, var(--mayazgan-green), var(--mayazgan-dark-green));
            color: #000;
            font-weight: 900;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 3px;
            padding: 20px;
            border-radius: 16px;
            border: none;
            width: 100%;
            margin-top: 25px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0, 255, 136, 0.2);
        }

        .btn-mayazgan:hover { 
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 255, 136, 0.4);
            filter: brightness(1.1);
        }

        .report-item {
            background: #161d29;
            border-radius: 18px;
            padding: 22px;
            margin-bottom: 18px;
            border-left: 6px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .report-ok { border-left-color: var(--mayazgan-green); }
        .report-wait { border-left-color: #f59e0b; }
        .report-no { border-left-color: #ef4444; }

        .report-item i { font-size: 1.4rem; }
        .report-ok i { color: var(--mayazgan-green); }
        .report-wait i { color: #f59e0b; }
        .report-no i { color: #ef4444; }

        .muktesep-btn {
            color: #60efff;
            text-decoration: none;
            font-weight: 700;
            border-bottom: 1px dashed #60efff;
        }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Ana Sayfa</a>
    <div style="text-align: center; margin-bottom: 30px;">
    <img src="mayazgan-logo.png" />
    <div class="brand-header">MAYAZGAN</div>
    <h2>Görev Süresi Hesaplayıcı</h2>
    </div>
    <div class="main-card">
        <div class="row">
            <div class="col-md-6 mb-4">
                <label class="section-label"><i class="fas fa-map-pin"></i> Bulunulan Yer Başlama</label>
                <input type="date" id="locStart" class="form-control custom-input">
                <span class="info-text">Şehir içi ve il dışı tayin süreleri için.</span>
            </div>
            <div class="col-md-6 mb-4">
                <label class="section-label"><i class="fas fa-mosque"></i> Diyanet Görev Başlangıcı</label>
                <input type="date" id="dibStart" class="form-control custom-input">
                <span class="info-text">3+1 Sözleşme ve kadro hakları için.</span>
            </div>
        </div>

        <div class="military-zone">
            <label class="section-label mb-3" style="color: #fff;"><i class="fas fa-shield-alt"></i> Askerlik & İzin Süreci</label>
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="info-text mb-1">Askere Gidiş</label>
                    <input type="date" id="milGo" class="form-control custom-input">
                </div>
                <div class="col-md-4">
                    <label class="info-text mb-1">Göreve Dönüş</label>
                    <input type="date" id="milReturn" class="form-control custom-input">
                </div>
                <div class="col-md-4">
                    <label class="info-text mb-1">Dönüş İzni (Maks 30 Gün)</label>
                    <input type="number" id="milLeave" class="form-control custom-input" placeholder="0">
                </div>
            </div>
            <span class="info-text mt-3 text-center">Not: Askerlik görev süresi içindeyse süre net hesaptan düşülür.</span>
        </div>

        <div class="mb-4">
            <label class="section-label"><i class="fas fa-star"></i> MBSTS Puanı</label>
            <input type="number" id="mbsts" class="form-control custom-input" placeholder="Puanınızı girin">
        </div>

        <button onclick="hesapla()" class="btn btn-mayazgan">ANALİZİ BAŞLAT</button>

        <div id="results" class="mt-5" style="display: none;">
            <h5 class="text-uppercase fw-bold mb-4" style="letter-spacing: 2px; font-size: 0.9rem;">Analiz Raporu</h5>
            <div id="output"></div>
        </div>
    </div>
</div>

<script>
    function hesapla() {
        const locVal = document.getElementById('locStart').value;
        const dibVal = document.getElementById('dibStart').value;
        const mGo = document.getElementById('milGo').value;
        const mRet = document.getElementById('milReturn').value;
        const mLeave = parseInt(document.getElementById('milLeave').value) || 0;
        const mbsts = parseInt(document.getElementById('mbsts').value) || 0;

        if(!locVal || !dibVal) { alert("Ana tarihleri girmelisiniz hoca."); return; }

        const today = new Date();
        const oneDay = 1000 * 60 * 60 * 24;
        const locStart = new Date(locVal);
        const dibStart = new Date(dibVal);

        let locDeduction = 0;
        let dibDeduction = 0;

        if(mGo && mRet) {
            const milS = new Date(mGo);
            const milE = new Date(mRet);
            const milDuration = (milE - milS) / oneDay;
            const leaveDays = Math.min(mLeave, 30);
            const totalOut = milDuration + leaveDays;

            // Askerlik görev süresi içerisinde ise düş
            if(milS >= locStart) locDeduction = totalOut;
            if(milS >= dibStart) dibDeduction = totalOut;
        }

        const netLocDays = Math.ceil((today - locStart) / oneDay) - locDeduction;
        const netDibDays = Math.ceil((today - dibStart) / oneDay) - dibDeduction;

        document.getElementById('results').style.display = 'block';
        const out = document.getElementById('output');
        out.innerHTML = "";

        // Rapor Kartları
        if(netLocDays >= 182) {
            render("fa-check-circle", "Şehir içi yer değişikliği hakkınız aktif.", "report-ok");
            if(mbsts >= 50) {
                render("fa-file-signature", `MBSTS yeterli. <a href="/muktesep-hesaplama" class="muktesep-btn">Müktesep</a> uygunsa DİBBYS, değilse 18/A dilekçesi verilebilir.`, "report-ok");
            } else {
                render("fa-ban", "MBSTS 50 altı: Tercih veya dilekçe hakkı bulunmuyor.", "report-no");
            }
        } else {
            render("fa-clock", `Şehir içi hakka ${Math.ceil(182 - netLocDays)} gün kaldı.`, "report-wait");
        }

        if(netLocDays >= 730) {
            render("fa-map-marked-alt", "İl dışı tayin hakkınız (2 yıl) dolmuştur.", "report-ok");
        } else {
            render("fa-hourglass-half", `İl dışı tayin hakkına ${Math.ceil(730 - netLocDays)} gün kaldı.`, "report-wait");
        }

        if(netDibDays >= 1460) {
            render("fa-rocket", "4 yıl net süre doldu: Kadro ve tam tayin serbestliği.", "report-ok");
        } else {
            render("fa-shield-alt", `Şehir dışı tayin hakkına (4 yıl) ${Math.ceil(1460 - netDibDays)} gün kaldı.`, "report-wait");
        }
    }

    function render(icon, text, cls) {
        const div = document.createElement('div');
        div.className = `report-item ${cls}`;
        div.innerHTML = `<i class="fas ${icon}"></i><span>${text}</span>`;
        document.getElementById('output').appendChild(div);
    }
</script>
</body>
    <footer style="text-align: center;">
    <div class="brand-line">
<br><br><style>
    .brand-line {
    display: flex;
    align-items: center;
    gap: 12px;
    color: var(--footer-text);
    font-size: 0.75rem;
}

.mini-logo {
    width: 24px;
    height: auto;
    opacity: 0.8;
}  
</style>
            <img src="mayazgan-logo.png" alt="Logo" class="mini-logo">
            <span>&copy; 2026 <strong>MAYAZGAN</strong> • Tüm Hakları Saklıdır</span>
</div>
    </footer>
</html>

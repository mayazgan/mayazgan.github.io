<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dilekçe Hazırlama | MAYAZGAN</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #020617;
            --card-bg: #1e293b;
            --accent: #10b981;
            --text-main: #f1f5f9;
        }

        /* Ekran Tasarımı */
        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .no-print { width: 100%; max-width: 800px; }
        .back-btn { color: #94a3b8; text-decoration: none; margin-bottom: 20px; display: inline-block; }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .full-width { grid-column: span 2; }
        
        label { display: block; font-size: 0.8rem; color: #94a3b8; margin-bottom: 5px; }
        input, textarea, select {
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #334155;
            background: #0f172a; color: white; box-sizing: border-box;
        }

        .btn-print {
            grid-column: span 2; padding: 15px; background: var(--accent);
            border: none; border-radius: 12px; color: white; font-weight: bold;
            cursor: pointer; font-size: 1.1rem; margin-top: 10px;
        }

        /* YAZDIRMA AYARLARI (A4 Kağıt Standartları) */
        #dilekce-cikti {
            display: none; /* Sadece yazdırırken görünecek */
            background: white;
            color: black;
            width: 210mm;
            min-height: 297mm;
            padding: 25mm 20mm 20mm 30mm; /* Standart resmi boşluklar */
            box-sizing: border-box;
            line-height: 1.5;
            font-family: "Times New Roman", Times, serif;
            font-size: 12pt;
        }

        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; }
            #dilekce-cikti { display: block !important; }
            @page { size: A4; margin: 0; }
        }

        /* Dilekçe Elemanları */
        .header-date { text-align: right; margin-bottom: 40px; }
        .target-authority { text-align: center; font-weight: bold; margin-bottom: 50px; text-transform: uppercase; }
        .body-text { text-indent: 1.5cm; text-align: justify; margin-bottom: 50px; }
        .signature-block { float: right; text-align: center; width: 250px; }
        .footer-info { clear: both; margin-top: 100px; font-size: 10pt; border-top: 1px solid #000; padding-top: 10px; }
    </style>
</head>
<body>

    <div class="no-print">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Geri Dön</a>
        
        <div class="form-grid">
            <div class="full-width">
                <h2 style="margin-top:0; color:var(--accent);">Dilekçe Robotu</h2>
            </div>

            <div class="full-width">
                <label>Şablon Seçin</label>
                <select id="sablon" onchange="sablonUygula()">
                    <option value="ozel">Özel Dilekçe (Kendim Yazacağım)</option>
                    <option value="tayin">Becayiş / Nakil Talebi</option>
                    <option value="izin">Yıllık İzin Formu</option>
                    <option value="mazeret">Mazeret İzni Talebi</option>
                </select>
            </div>

            <div class="full-width">
                <label>Gideceği Makam (Örn: SİVAS İL MÜFTÜLÜĞÜNE)</label>
                <input type="text" id="makam" placeholder="SİVAS İL MÜFTÜLÜĞÜNE">
            </div>

            <div class="full-width">
                <label>Dilekçe Konusu / Metni</label>
                <textarea id="metin" rows="10" placeholder="Talebinizi detaylıca yazın..."></textarea>
            </div>

            <div>
                <label>Ad Soyad</label>
                <input type="text" id="adsoyad">
            </div>

            <div>
                <label>Sicil / T.C. No</label>
                <input type="text" id="sicil">
            </div>

            <div class="full-width">
                <label>Adres ve İletişim Bilgileri</label>
                <input type="text" id="adres" placeholder="Adres / Telefon">
            </div>

            <button class="btn-print" onclick="hazirlaVeYazdir()">
                <i class="fas fa-print"></i> DİLEKÇEYİ OLUŞTUR VE YAZDIR
            </button>
        </div>
    </div>

    <div id="dilekce-cikti">
        <div class="header-date" id="c-tarih"></div>
        <div class="target-authority" id="c-makam"></div>
        <div class="body-text" id="c-metin"></div>
        
        <div class="signature-block">
            <div id="c-adsoyad" style="font-weight: bold;"></div>
            <div id="c-sicil"></div>
            <br><br><br>
            <span>(İmza)</span>
        </div>

        <div class="footer-info">
            <strong>ADRES:</strong> <span id="c-adres"></span>
        </div>
    </div>

    <script>
        function sablonUygula() {
            const sablon = document.getElementById('sablon').value;
            const metin = document.getElementById('metin');
            
            const list = {
                tayin: "Halen Sivas ili ... ilçesi ... camiinde ... unvanı ile görev yapmaktayım. 657 Sayılı Devlet Memurları Kanunu ve Atama ve Yer Değiştirme Yönetmeliği hükümleri çerçevesinde, ekli mazeret belgelerime istinaden Sivas İl Merkezine naklen atanma talebimin değerlendirilmesini arz ederim.",
                izin: "2026 yılına ait yıllık iznimden ... gününü ... tarihinden itibaren kullanmak istiyorum. İzin süresince bulunacağım adres aşağıda belirtilmiştir. Gereğini bilgilerinize arz ederim.",
                mazeret: "Ekte sunduğum mazeretim sebebiyle, ... tarihleri arasında ... gün mazeret izni kullanmak istiyorum. Bilgilerinize ve gereğine arz ederim.",
                ozel: ""
            };
            
            if(list[sablon] !== undefined) metin.value = list[sablon];
        }

        function hazirlaVeYazdir() {
            // Form verilerini A4 alanına aktar
            document.getElementById('c-tarih').innerText = new Date().toLocaleDateString('tr-TR');
            document.getElementById('c-makam').innerText = document.getElementById('makam').value;
            document.getElementById('c-metin').innerText = document.getElementById('metin').value;
            document.getElementById('c-adsoyad').innerText = document.getElementById('adsoyad').value;
            document.getElementById('c-sicil').innerText = "Sicil No: " + document.getElementById('sicil').value;
            document.getElementById('c-adres').innerText = document.getElementById('adres').value;

            // Yazdır
            window.print();
        }
    </script>

</body>
</html>

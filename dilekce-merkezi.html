<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resmi Dilekçe Hazırlama | MAYAZGAN</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #020617;
            --card-bg: #1e293b;
            --accent: #10b981;
            --text-main: #f1f5f9;
        }

        /* --- ARAYÜZ (EKRAN) TASARIMI --- */
        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .no-print { width: 100%; max-width: 900px; margin-bottom: 50px; }
        
        .form-container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .full-width { grid-column: span 2; }
        
        label { display: block; font-size: 0.8rem; color: #94a3b8; margin-bottom: 5px; }
        
        input, textarea {
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #334155;
            background: #0f172a; color: white; box-sizing: border-box; outline: none;
        }

        .btn-print {
            grid-column: span 2; padding: 18px; background: var(--accent);
            border: none; border-radius: 14px; color: white; font-weight: bold;
            cursor: pointer; font-size: 1.1rem; margin-top: 15px; transition: 0.3s;
        }

        /* --- RESMİ DİLEKÇE TASARIMI (A4 ÇIKTI) --- */
        #dilekce-cikti {
            display: none;
            background: white;
            color: black;
            width: 210mm;
            min-height: 297mm;
            padding: 20mm 20mm 20mm 30mm; /* Standart dosyalama paylı boşluk */
            box-sizing: border-box;
            font-family: "Times New Roman", Times, serif;
            font-size: 12pt;
            line-height: 1.5;
        }

        /* Tarih Sağ Üstte */
        .out-tarih { 
            text-align: right; 
            margin-bottom: 10px; 
            font-weight: normal;
        }

        /* Sol Üst Bilgi Bloğu (Sola Yaslı ama Hizalı) */
        .ust-bilgi-bloku {
            text-align: left;
            margin-bottom: 40px;
            width: fit-content;
        }

        .info-row {
            display: grid;
            grid-template-columns: 120px 10px auto;
            margin-bottom: 3px;
            font-size: 11pt;
        }

        /* Makam Başlığı (Tam Orta) */
        .out-makam { 
            text-align: center; 
            font-weight: bold; 
            margin-bottom: 50px; 
            text-transform: uppercase;
            padding: 0 20px;
            clear: both;
        }

        /* Dilekçe Metni (İki Yana Yasla) */
        .out-metin { 
            text-indent: 1.5cm; 
            text-align: justify; 
            margin-bottom: 40px;
            word-wrap: break-word;
        }
        
        /* İmza Bloğu (Sağda Ortalanmış) */
        .out-imza-alani { 
            float: right; 
            text-align: center; 
            min-width: 5cm;
            margin-top: 20px;
        }

        .out-adsoyad-imza {
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        /* Ekler Bölümü */
        .out-ekler { 
            margin-top: 80px; 
            font-size: 10pt; 
            clear: both;
        }

        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; }
            #dilekce-cikti { display: block !important; }
            @page { size: A4; margin: 0; }
        }
    </style>
</head>
<body>

    <div class="no-print">
        <div class="form-container">
            <h2 style="margin-top:0; color:var(--accent); text-align: center;">DİBBYS Standart Dilekçe Hazırlayıcı</h2>
            
            <div class="form-grid">
                <div><label>Ad Soyad</label><input type="text" id="adsoyad" placeholder="Örn: Ahmet Yılmaz"></div>
                <div><label>T.C. Kimlik No</label><input type="text" id="tckimlik" maxlength="11"></div>
                <div><label>Kurum Sicil No</label><input type="text" id="sicil"></div>
                <div><label>Telefon No</label><input type="text" id="telefon"></div>
                <div class="full-width"><label>İkamet Adresi</label><input type="text" id="adres"></div>
                
                <div class="full-width">
                    <label>Gideceği Makam</label>
                    <input type="text" id="makam" placeholder="T.C. SİVAS VALİLİĞİNE (İl Müftülüğü)">
                </div>

                <div class="full-width">
                    <label>Dilekçe Metni</label>
                    <textarea id="metin" rows="6" placeholder="...gereğini bilgilerinize arz ederim."></textarea>
                </div>

                <div class="full-width">
                    <label>Varsa Ekler (Her satıra bir ek)</label>
                    <textarea id="ekler" rows="2"></textarea>
                </div>

                <button class="btn-print" onclick="yazdir()">
                    <i class="fas fa-print"></i> RESMİ ÇIKTIYI HAZIRLA
                </button>
            </div>
        </div>
    </div>

    <div id="dilekce-cikti">
        <div class="out-tarih" id="p-tarih"></div>

        <div class="ust-bilgi-bloku">
            <div class="info-row"><span>ADI SOYADI</span><span>:</span><span id="p-adsoyad"></span></div>
            <div class="info-row"><span>T.C. NO</span><span>:</span><span id="p-tckimlik"></span></div>
            <div class="info-row"><span>SİCİL NO</span><span>:</span><span id="p-sicil"></span></div>
            <div class="info-row"><span>ADRES</span><span>:</span><span id="p-adres"></span></div>
            <div class="info-row"><span>TEL</span><span>:</span><span id="p-telefon"></span></div>
        </div>

        <div class="out-makam" id="p-makam"></div>

        <div class="out-metin" id="p-metin"></div>
        
        <div class="out-imza-alani">
            <div class="out-adsoyad-imza" id="p-adsoyad-imza"></div>
            <div>(İmza)</div>
        </div>

        <div class="out-ekler" id="p-ekler-alan" style="display:none;">
            <strong>EKLER:</strong><br>
            <span id="p-ekler" style="font-weight: normal; white-space: pre-line;"></span>
        </div>
    </div>

    <script>
        function yazdir() {
            // Tarih
            const bugun = new Date();
            document.getElementById('p-tarih').innerText = bugun.toLocaleDateString('tr-TR');

            // Verileri Aktar
            const adSoyad = document.getElementById('adsoyad').value;
            document.getElementById('p-adsoyad').innerText = adSoyad;
            document.getElementById('p-adsoyad-imza').innerText = adSoyad;
            
            document.getElementById('p-tckimlik').innerText = document.getElementById('tckimlik').value;
            document.getElementById('p-sicil').innerText = document.getElementById('sicil').value;
            document.getElementById('p-adres').innerText = document.getElementById('adres').value;
            document.getElementById('p-telefon').innerText = document.getElementById('telefon').value;
            
            document.getElementById('p-makam').innerText = document.getElementById('makam').value;
            document.getElementById('p-metin').innerText = document.getElementById('metin').value;

            // Ekleri Yönet
            const ekText = document.getElementById('ekler').value;
            if(ekText.trim() !== "") {
                document.getElementById('p-ekler-alan').style.display = "block";
                document.getElementById('p-ekler').innerText = ekText;
            } else {
                document.getElementById('p-ekler-alan').style.display = "none";
            }

            // Yazdır
            window.print();
        }
    </script>
</body>
</html>
